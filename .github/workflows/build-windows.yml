name: Build Windows MSI

on: workflow_dispatch

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4

      - run: pnpm install --no-frozen-lockfile

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build Tauri app (with signing)
        shell: bash
        run: pnpm tauri build -- --no-default-features --features duckdb-bundled,mq-admin
        env:
          CI: true
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Generate latest.json for internal update
        id: latest
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          MSI=$(ls target/release/bundle/msi/*.msi | head -1)
          MSI_NAME=$(basename "$MSI")
          EXE=$(ls target/release/bundle/nsis/*.exe | head -1)
          EXE_NAME=$(basename "$EXE")
          SIG_FILE="${MSI}.sig"
          NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          if [ -f "$SIG_FILE" ]; then
            SIGNATURE=$(cat "$SIG_FILE")
          else
            SIGNATURE=""
          fi

          cat > target/release/bundle/latest.json << JSONEOF
          {
            "version": "${VERSION}",
            "notes": "内网版本更新。\\n下载地址: \\n- MSI: http://25.75.3.1/dbx-drivers/releases/latest/${MSI_NAME}\\n- EXE: http://25.75.3.1/dbx-drivers/releases/latest/${EXE_NAME}",
            "pub_date": "${NOW}",
            "platforms": {
              "windows-x86_64": {
                "signature": "${SIGNATURE}",
                "url": "http://25.75.3.1/dbx-drivers/releases/latest/${EXE_NAME}"
              },
              "windows-x86_64-nsis": {
                "signature": "${SIGNATURE}",
                "url": "http://25.75.3.1/dbx-drivers/releases/latest/${EXE_NAME}"
              },
              "windows-x86_64-msi": {
                "signature": "${SIGNATURE}",
                "url": "http://25.75.3.1/dbx-drivers/releases/latest/${MSI_NAME}"
              }
            }
          }
          JSONEOF

          echo "Generated latest.json:"
          cat target/release/bundle/latest.json
          echo "msi_name=$MSI_NAME" >> $GITHUB_OUTPUT
          echo "exe_name=$EXE_NAME" >> $GITHUB_OUTPUT

      - name: Read version
        id: version
        shell: bash
        run: echo "value=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.value }}-internal
          name: "DBX 内网版 v${{ steps.version.outputs.value }}"
          body: |
            DBX 内网定制版 Windows x64 安装包。

            ## 部署到内网 nginx

            将以下文件放到 `http://25.75.3.1/dbx-drivers/releases/latest/`：

            - `${{ steps.latest.outputs.msi_name }}`
            - `${{ steps.latest.outputs.exe_name }}`
            - `latest.json`

            ## 内网用户更新

            已安装内网版 DBX 的用户启动后自动检测更新。
            新用户直接安装 `.msi` 即可。

            - 驱动下载地址：`http://25.75.3.1/dbx-drivers/`
            - 源码分支：`internal-build`
            - 上游版本：v${{ steps.version.outputs.value }}
          files: |
            target/release/bundle/msi/*.msi
            target/release/bundle/nsis/*.exe
            target/release/bundle/latest.json
