name: Issue Claim

on:
  issue_comment:
    types: [created]

concurrency:
  group: issue-claim-${{ github.event.issue.number }}
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  claim:
    runs-on: ubuntu-latest
    if: ${{ !github.event.issue.pull_request }}
    steps:
      - uses: actions/checkout@v5

      - name: Create DBX bot token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.DBX_BOT_APP_ID }}
          private-key: ${{ secrets.DBX_BOT_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: dbx
          permission-issues: write

      - name: Handle /claim command
        run: node .github/scripts/issue-claim.mjs
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_USER: ${{ github.event.comment.user.login }}
          COMMENT_USER_TYPE: ${{ github.event.comment.user.type }}
